name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          FAKTUR_DESKTOP_SIGNING_KEY: ${{ secrets.FAKTUR_DESKTOP_SIGNING_KEY }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: faktur-${{ matrix.os }}
          path: |
            dist/FakturDesktop-Installer.exe
            dist/FakturDesktop-mac.dmg
            dist/FakturDesktop-mac.zip
            dist/FakturDesktop-linux-x64.AppImage
          if-no-files-found: ignore
          retention-days: 7

  release:
    name: Draft release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/FakturDesktop-Installer.exe
            artifacts/FakturDesktop-mac.dmg
            artifacts/FakturDesktop-mac.zip
            artifacts/FakturDesktop-linux-x64.AppImage
