<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; script-src 'self';" />
  <title>Faktur — Connexion</title>
  <style>
    :root {
      color-scheme: light dark;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #faf9f7;
      color: #1a1a1a;
    }
    @media (prefers-color-scheme: dark) {
      html, body { background: #080808; color: #efefef; }
      .card { background: #141414; border: 1px solid #1f1f1f; }
      .subtitle { color: #8b8b8b; }
      .footer { color: #606060; }
    }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      padding: 32px;
    }
    .card {
      width: 100%; max-width: 420px;
      padding: 40px 36px;
      border-radius: 24px;
      background: #ffffff;
      border: 1px solid #e8e6e1;
      box-shadow: 0 20px 60px rgba(0,0,0,0.06);
      text-align: center;
    }
    .logo {
      width: 64px; height: 64px;
      margin: 0 auto 24px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 20px;
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: white;
      font-family: 'Lexend', sans-serif;
      font-weight: 800;
      font-size: 28px;
      box-shadow: 0 8px 24px rgba(99,102,241,0.3);
    }
    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .subtitle {
      margin: 0 0 32px;
      font-size: 14px;
      color: #6b6b6b;
      line-height: 1.5;
    }
    button {
      width: 100%;
      height: 48px;
      border: 0;
      border-radius: 14px;
      background: #6366f1;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 8px 24px rgba(99,102,241,0.25);
    }
    button:hover { background: #5558e3; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.6; cursor: wait; transform: none; }
    .error {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      color: #ef4444;
      font-size: 12px;
      text-align: left;
      display: none;
    }
    .error.visible { display: block; }
    .footer {
      margin-top: 24px;
      font-size: 11px;
      color: #8b8b8b;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">F</div>
    <h1>Bienvenue sur Faktur</h1>
    <p class="subtitle">Connectez-vous à votre compte via votre navigateur. Votre mot de passe ne transite jamais par cette application.</p>
    <button id="connect" type="button">
      <span id="label">Se connecter avec Faktur</span>
    </button>
    <div id="error" class="error"></div>
    <p class="footer">Faktur Desktop · v2.0.0</p>
  </main>
  <script src="./js/login.js"></script>
</body>
</html>
