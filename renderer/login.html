<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-src 'none'; frame-ancestors 'none';" />
  <title>Faktur Desktop — Connexion</title>
  <link rel="icon" type="image/x-icon" href="./assets/favicon.ico" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ---------- Design tokens ---------- */
    :root {
      --bg:              #080808;
      --bg-elev:         #111111;
      --bg-card:         #141414;
      --border:          #222222;
      --border-soft:     #1c1c1c;
      --fg:              #efefef;
      --fg-muted:        #999999;
      --fg-mute-2:       #606060;
      --primary:         #6366f1;
      --primary-hover:   #818cf8;
      --primary-soft:    rgba(99, 102, 241, 0.12);
      --primary-ring:    rgba(99, 102, 241, 0.25);
      --emerald:         #22c55e;
      --emerald-soft:    rgba(34, 197, 94, 0.12);
      --destructive:     #ef4444;
      --destructive-bg:  rgba(239, 68, 68, 0.08);
      --destructive-brd: rgba(239, 68, 68, 0.22);
      --amber:           #f59e0b;
      --amber-bg:        rgba(245, 158, 11, 0.08);
      --amber-brd:       rgba(245, 158, 11, 0.22);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'Lexend', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 24px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 10% 10%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 90%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    main {
      position: relative;
      width: 100%;
      max-width: 400px;
      z-index: 1;
    }

    /* ---------- Disconnect banner ---------- */
    .banner {
      display: none;
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--destructive-brd);
      background: var(--destructive-bg);
      color: #fca5a5;
      font-size: 12px;
      line-height: 1.5;
      text-align: left;
      align-items: flex-start;
      gap: 10px;
    }
    .banner.visible { display: flex; }
    .banner.amber {
      border-color: var(--amber-brd);
      background: var(--amber-bg);
      color: #fcd34d;
    }
    .banner .dot {
      flex-shrink: 0;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      margin-top: 5px;
      box-shadow: 0 0 10px currentColor;
    }
    .banner strong {
      display: block;
      margin-bottom: 2px;
      font-weight: 600;
      color: var(--fg);
    }

    /* ---------- Auth card ---------- */
    .card {
      padding: 40px 32px;
      border-radius: 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      box-shadow:
        0 10px 40px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.02);
    }

    .logo-wrap {
      position: relative;
      width: 76px;
      height: 76px;
      margin: 0 auto 22px;
    }
    .logo {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 12px 32px rgba(99, 102, 241, 0.4));
      z-index: 2;
      transition: transform 0.3s ease;
    }
    .logo img { width: 100%; height: 100%; display: block; }
    .halo {
      position: absolute;
      inset: 0;
      border-radius: 26px;
      background: var(--primary);
      filter: blur(28px);
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 1;
    }
    .halo.pulsing {
      opacity: 0.45;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.28; transform: scale(0.94); }
      50%      { opacity: 0.55; transform: scale(1.08); }
    }

    h1 {
      margin: 0 0 6px;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.02em;
    }
    .subtitle {
      margin: 0 0 28px;
      font-size: 13px;
      color: var(--fg-muted);
      text-align: center;
      line-height: 1.55;
    }

    /* ---------- Primary button ---------- */
    button.primary {
      width: 100%;
      height: 46px;
      border: 0;
      border-radius: 14px;
      background: var(--primary);
      color: white;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.005em;
      cursor: pointer;
      transition: all 0.18s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 8px 22px rgba(99, 102, 241, 0.28);
    }
    button.primary:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 10px 28px rgba(99, 102, 241, 0.38);
    }
    button.primary:active { transform: translateY(0); }
    button.primary:disabled {
      opacity: 1;
      cursor: default;
      transform: none;
      background: #1c1c1c;
      color: var(--fg);
      border: 1px solid var(--border);
      box-shadow: none;
    }
    button.primary.success {
      background: var(--emerald-soft);
      color: var(--emerald);
      border: 1px solid rgba(34, 197, 94, 0.3);
      box-shadow: none;
    }

    /* ---------- Faktur spinner (circular mask) ---------- */
    .faktur-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      position: relative;
    }
    .faktur-spinner::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.22);
      border-top-color: currentColor;
      animation: spin 0.8s linear infinite;
    }
    .faktur-spinner.dark::after {
      border-color: rgba(99, 102, 241, 0.25);
      border-top-color: var(--primary);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---------- Check icon (success state) ---------- */
    .check-icon {
      display: inline-flex;
      width: 16px;
      height: 16px;
      align-items: center;
      justify-content: center;
    }
    .check-icon svg { width: 16px; height: 16px; }

    /* ---------- Error ---------- */
    .error {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 12px;
      background: var(--destructive-bg);
      border: 1px solid var(--destructive-brd);
      color: #fca5a5;
      font-size: 11px;
      text-align: left;
      display: none;
    }
    .error.visible { display: block; }

    /* ---------- Footer ---------- */
    .footer {
      margin-top: 22px;
      text-align: center;
      font-size: 10px;
      color: var(--fg-mute-2);
      letter-spacing: 0.02em;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    main { animation: fadeInUp 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }

    @media (max-width: 420px) {
      .card { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <main>
    <!-- ---------- Disconnect banner ---------- -->
    <div id="banner" class="banner" role="alert">
      <span class="dot"></span>
      <div>
        <strong id="banner-title">Vous avez été déconnecté</strong>
        <span id="banner-message">Votre session a expiré. Veuillez vous reconnecter.</span>
      </div>
    </div>

    <!-- ---------- Auth card ---------- -->
    <div class="card">
      <div class="logo-wrap">
        <div id="halo" class="halo"></div>
        <div class="logo"><img src="./assets/logo.svg" alt="Faktur Desktop" /></div>
      </div>
      <h1 id="title">Bienvenue sur Faktur Desktop</h1>
      <p id="subtitle" class="subtitle">
        Connectez-vous à votre compte via votre navigateur. Votre mot de passe
        ne transite jamais par cette application.
      </p>
      <button id="connect" class="primary" type="button">
        <span id="icon-slot"></span>
        <span id="label">Se connecter avec Faktur</span>
      </button>
      <div id="error" class="error"></div>
    </div>

    <p class="footer">Faktur Desktop · v<span id="app-version">2.1.0</span></p>
  </main>
  <script src="./js/login.js"></script>
</body>
</html>
