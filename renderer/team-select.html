<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; connect-src 'self' https:; object-src 'none'; base-uri 'none'; form-action 'none'; frame-src 'none'; frame-ancestors 'none';" />
  <title>Faktur Desktop — Choisir une équipe</title>
  <link rel="icon" type="image/x-icon" href="./assets/favicon.ico" />

  <style>
    :root {
      --bg:              #080808;
      --overlay:         rgba(20, 20, 20, 0.82);
      --surface:         rgba(255, 255, 255, 0.025);
      --surface-hover:   rgba(255, 255, 255, 0.05);
      --border:          rgba(255, 255, 255, 0.06);
      --border-strong:   rgba(255, 255, 255, 0.10);
      --fg:              #efefef;
      --fg-muted:        rgba(239, 239, 239, 0.62);
      --fg-mute-2:       rgba(239, 239, 239, 0.40);
      --primary:         #6366f1;
      --primary-hover:   #818cf8;
      --primary-soft:    rgba(99, 102, 241, 0.12);
      --primary-ring:    rgba(99, 102, 241, 0.25);
      --emerald:         #22c55e;
      --emerald-soft:    rgba(34, 197, 94, 0.12);
      --amber:           #f59e0b;
      --amber-soft:      rgba(245, 158, 11, 0.10);
      --amber-brd:       rgba(245, 158, 11, 0.30);
      --accent:          #38bdf8;
      --accent-soft:     rgba(56, 189, 248, 0.12);
      --destructive:     #ef4444;
      --destructive-bg:  rgba(239, 68, 68, 0.08);
      --destructive-brd: rgba(239, 68, 68, 0.22);
      --shadow-overlay:  0 30px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.03);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100vh;
      font-family: 'Lexend', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg); color: var(--fg);
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.01em; overflow: hidden;
    }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px 20px; position: relative; }

    .veil-canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; display: block; }
    .veil-overlay {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background:
        radial-gradient(ellipse at 8% 8%, rgba(99, 102, 241, 0.10) 0%, transparent 45%),
        radial-gradient(ellipse at 92% 92%, rgba(139, 92, 246, 0.07) 0%, transparent 45%),
        rgba(8, 8, 8, 0.55);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }

    main {
      position: relative; z-index: 2; width: 100%; max-width: 460px;
      display: flex; flex-direction: column; align-items: center;
      animation: fadeInUp 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 22px;
      animation: fadeInUp 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }
    .brand img { width: 32px; height: 32px; filter: drop-shadow(0 6px 18px rgba(99, 102, 241, 0.45)); }
    .brand span {
      font-size: 22px; font-weight: 700;
      letter-spacing: -0.02em; color: var(--fg);
    }

    .card {
      width: 100%;
      background: var(--overlay);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: var(--shadow-overlay);
    }

    .card-header { display: flex; align-items: center; gap: 14px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
    .card-header-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--primary-soft); color: var(--primary-hover);
      display: inline-flex; align-items: center; justify-content: center;
    }
    .card-header-icon svg { width: 22px; height: 22px; }
    .card-header h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
    .card-header p { margin: 2px 0 0; font-size: 12px; color: var(--fg-muted); }
    .card-header-action {
      margin-left: auto;
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 8px;
      color: var(--fg-muted); border: 1px solid var(--border);
      background: var(--surface);
      transition: all 0.15s; text-decoration: none; cursor: pointer;
    }
    .card-header-action:hover { color: var(--fg); border-color: var(--border-strong); background: var(--surface-hover); }
    .card-header-action svg { width: 16px; height: 16px; }

    .user-row {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; margin: 16px 0 4px;
      border: 1px solid var(--border); border-radius: 12px;
      background: var(--surface);
      font-size: 12px;
    }
    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--primary-soft); color: var(--primary-hover);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; overflow: hidden; flex-shrink: 0;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { flex: 1; min-width: 0; }
    .user-name strong { display: block; color: var(--fg); font-weight: 500; font-size: 13px; }
    .user-name span { display: block; color: var(--fg-muted); font-size: 11px; }
    .user-logout {
      background: none; border: 0; padding: 4px 8px;
      color: var(--fg-muted); font-size: 11px; cursor: pointer;
      border-radius: 6px; transition: all 0.15s;
    }
    .user-logout:hover { color: var(--fg); background: var(--surface-hover); }

    .section-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--fg-muted);
      margin: 18px 0 10px;
    }

    .teams {
      display: flex; flex-direction: column; gap: 6px;
      max-height: 320px; overflow-y: auto;
      margin: 0 -4px; padding: 0 4px;
    }
    .teams::-webkit-scrollbar { width: 6px; }
    .teams::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    .team {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--border); border-radius: 12px;
      background: transparent;
      cursor: pointer;
      transition: all 0.18s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      text-align: left; width: 100%;
      font-family: inherit; color: inherit;
    }
    .team:hover {
      border-color: var(--border-strong);
      background: var(--surface-hover);
    }
    .team:focus-visible { outline: 2px solid var(--primary-ring); outline-offset: 2px; }

    .team.locked .team-name { color: var(--fg-muted); }
    .team.locked:hover {
      border-color: var(--amber-brd);
      background: var(--amber-soft);
    }

    .team-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--primary-soft); color: var(--primary-hover);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; overflow: hidden; flex-shrink: 0;
    }
    .team-icon img { width: 100%; height: 100%; object-fit: cover; }

    .team-body { flex: 1; min-width: 0; }
    .team-name {
      display: flex; align-items: center; gap: 6px;
      font-size: 13.5px; font-weight: 500;
      letter-spacing: -0.01em;
    }
    .team-meta { margin-top: 2px; font-size: 11px; color: var(--fg-muted); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

    .badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 1.5px 6px; border-radius: 999px;
      font-size: 9.5px; font-weight: 600; letter-spacing: 0.01em;
      line-height: 1.2;
    }
    .badge svg { width: 9px; height: 9px; }
    .badge.standard { background: var(--accent-soft); color: var(--accent); }
    .badge.private { background: var(--emerald-soft); color: var(--emerald); }
    .badge.locked { background: var(--amber-soft); color: var(--amber); }

    .team-arrow {
      flex-shrink: 0; color: var(--fg-mute-2);
    }
    .team-arrow svg { width: 16px; height: 16px; }
    .team:hover .team-arrow { color: var(--fg); }
    .team.locked .team-arrow { color: var(--amber); }

    .empty {
      padding: 32px; text-align: center;
      border: 1px dashed var(--border); border-radius: 12px;
      color: var(--fg-muted); font-size: 13px;
    }

    .footer {
      margin-top: 20px; padding-top: 16px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .toggle {
      display: flex; align-items: center; gap: 10px; cursor: pointer;
      user-select: none; flex: 1;
    }
    .toggle input {
      appearance: none; -webkit-appearance: none;
      width: 30px; height: 17px;
      background: #2a2a2a; border-radius: 10px;
      position: relative; cursor: pointer;
      transition: background 0.18s; margin: 0; flex-shrink: 0;
    }
    .toggle input::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 13px; height: 13px; background: #efefef; border-radius: 50%;
      transition: transform 0.18s;
    }
    .toggle input:checked { background: var(--primary); }
    .toggle input:checked::after { transform: translateX(13px); }
    .toggle-text { font-size: 11.5px; color: var(--fg-muted); line-height: 1.4; }
    .toggle-text strong { display: block; color: var(--fg); font-weight: 500; font-size: 12px; }

    .err {
      margin-top: 12px; padding: 10px 12px;
      border-radius: 10px; background: var(--destructive-bg); border: 1px solid var(--destructive-brd);
      color: #fca5a5; font-size: 11px; display: none;
    }
    .err.visible { display: block; }

    .loading {
      padding: 24px; text-align: center; color: var(--fg-muted); font-size: 13px;
    }
    .spinner {
      display: inline-block; width: 14px; height: 14px; vertical-align: -2px; margin-right: 8px;
      border: 2px solid rgba(255,255,255,0.18); border-top-color: currentColor;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }

    .launch-overlay {
      position: fixed; inset: 0; z-index: 50;
      display: none;
      align-items: center; justify-content: center;
      background: rgba(8, 8, 8, 0.78);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      animation: fadeIn 0.25s ease-out both;
    }
    .launch-overlay.visible { display: flex; }
    .launch-card {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      padding: 32px 40px;
      animation: fadeInUp 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }
    .launch-spinner {
      width: 36px; height: 36px; position: relative;
    }
    .launch-spinner::after {
      content: ''; position: absolute; inset: 0;
      border: 3px solid rgba(255,255,255,0.16);
      border-top-color: var(--primary-hover);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    .launch-title {
      font-size: 15px; font-weight: 600; color: var(--fg);
      letter-spacing: -0.01em;
    }
    .launch-sub {
      font-size: 12px; color: var(--fg-muted);
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <canvas id="darkveil" class="veil-canvas" aria-hidden="true"></canvas>
  <div class="veil-overlay" aria-hidden="true"></div>

  <main>
    <div class="brand">
      <img src="./assets/logo.svg" alt="Faktur" />
      <span>Faktur</span>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-header-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <div>
          <h1>Choisir une équipe</h1>
          <p>Avec laquelle démarrer Faktur Desktop</p>
        </div>
        <a id="settings-link" href="./settings.html" class="card-header-action" title="Préférences" aria-label="Préférences">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </a>
      </div>

      <div id="user-row" class="user-row" hidden>
        <span class="user-avatar" id="user-avatar"></span>
        <div class="user-name"><strong id="user-fullname"></strong><span id="user-email"></span></div>
        <button class="user-logout" id="logout" type="button">Se déconnecter</button>
      </div>

      <p class="section-label">Vos équipes</p>

      <div id="loading" class="loading"><span class="spinner"></span>Chargement…</div>
      <div id="teams" class="teams" hidden></div>
      <div id="empty" class="empty" hidden>
        Aucune équipe trouvée. Créez-en une depuis Faktur web puis revenez ici.
      </div>

      <div class="footer">
        <label class="toggle">
          <input type="checkbox" id="always-show" checked />
          <div class="toggle-text">
            <strong>Toujours afficher au démarrage</strong>
            Décochez pour démarrer directement sur la dernière équipe utilisée.
          </div>
        </label>
      </div>

      <div id="err" class="err"></div>
    </div>
  </main>

  <div id="launch" class="launch-overlay" aria-hidden="true">
    <div class="launch-card">
      <div class="launch-spinner" aria-hidden="true"></div>
      <div class="launch-title" id="launch-title">Chargement de votre espace</div>
      <div class="launch-sub" id="launch-sub">Connexion à Faktur…</div>
    </div>
  </div>

  <script src="./js/darkveil.js"></script>
  <script src="./js/team-select.js"></script>
</body>
</html>
