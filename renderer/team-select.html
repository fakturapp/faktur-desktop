<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; connect-src 'self' https:; object-src 'none'; base-uri 'none'; form-action 'none'; frame-src 'none'; frame-ancestors 'none';" />
  <title>Faktur Desktop — Choisir une équipe</title>
  <link rel="icon" type="image/x-icon" href="./assets/favicon.ico" />

  <style>
    :root {
      --bg:              #080808;
      --border:          rgba(255,255,255,0.06);
      --border-strong:   rgba(255,255,255,0.10);
      --fg:              #efefef;
      --fg-muted:        #999999;
      --fg-mute-2:       #606060;
      --primary:         #6366f1;
      --primary-hover:   #818cf8;
      --primary-soft:    rgba(99, 102, 241, 0.12);
      --emerald:         #22c55e;
      --emerald-soft:    rgba(34, 197, 94, 0.12);
      --amber:           #f59e0b;
      --amber-soft:      rgba(245, 158, 11, 0.10);
      --amber-brd:       rgba(245, 158, 11, 0.30);
      --accent:          #38bdf8;
      --accent-soft:     rgba(56, 189, 248, 0.12);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg); color: var(--fg);
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.01em; overflow-y: auto;
    }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 32px 20px; position: relative; }

    .veil-canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; display: block; }
    .veil-overlay {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background:
        radial-gradient(ellipse at 8% 8%, rgba(99, 102, 241, 0.10) 0%, transparent 45%),
        radial-gradient(ellipse at 92% 92%, rgba(139, 92, 246, 0.07) 0%, transparent 45%),
        rgba(8, 8, 8, 0.55);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    }

    main {
      position: relative; z-index: 2; width: 100%; max-width: 640px;
      animation: fadeInUp 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }
    .card {
      background: rgba(20, 20, 20, 0.82);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
    }
    .header { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
    .header img { width: 36px; height: 36px; }
    .header h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.02em; flex: 1; }
    .settings-link {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 8px;
      color: var(--fg-muted); border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      transition: all 0.15s; text-decoration: none;
    }
    .settings-link:hover { color: var(--fg); border-color: var(--border-strong); background: rgba(255,255,255,0.05); }
    .subtitle { margin: 0 0 24px; font-size: 13px; color: var(--fg-muted); line-height: 1.55; }

    .user-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; margin-bottom: 18px;
      border: 1px solid var(--border); border-radius: 12px;
      background: rgba(255,255,255,0.02);
      font-size: 12px;
    }
    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--primary-soft); color: var(--primary-hover);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; overflow: hidden;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-name { flex: 1; min-width: 0; }
    .user-name span { display: block; color: var(--fg-muted); font-size: 10px; }
    .user-logout {
      background: none; border: 0; padding: 4px 8px;
      color: var(--fg-muted); font-size: 11px; cursor: pointer;
      border-radius: 6px; transition: all 0.15s;
    }
    .user-logout:hover { color: var(--fg); background: rgba(255,255,255,0.04); }

    .teams {
      display: flex; flex-direction: column; gap: 8px;
      max-height: 360px; overflow-y: auto;
      padding-right: 4px;
    }
    .teams::-webkit-scrollbar { width: 6px; }
    .teams::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    .team {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      border: 1px solid var(--border); border-radius: 14px;
      background: rgba(255,255,255,0.02);
      cursor: pointer;
      transition: all 0.18s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      text-align: left; width: 100%;
      font-family: inherit; color: inherit;
    }
    .team:hover {
      border-color: var(--border-strong);
      background: rgba(255,255,255,0.04);
      transform: translateY(-1px);
    }
    .team.locked { cursor: pointer; }
    .team.locked:hover {
      border-color: var(--amber-brd);
      background: var(--amber-soft);
    }
    .team-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: var(--primary-soft); color: var(--primary-hover);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; overflow: hidden; flex-shrink: 0;
    }
    .team-icon img { width: 100%; height: 100%; object-fit: cover; }
    .team-body { flex: 1; min-width: 0; }
    .team-name { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; }
    .team-meta { margin-top: 2px; font-size: 11px; color: var(--fg-muted); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 7px; border-radius: 999px;
      font-size: 10px; font-weight: 600; letter-spacing: 0.01em;
    }
    .badge.standard { background: var(--accent-soft); color: var(--accent); }
    .badge.private { background: var(--emerald-soft); color: var(--emerald); }
    .badge.locked { background: var(--amber-soft); color: var(--amber); }
    .team-arrow {
      flex-shrink: 0; color: var(--fg-mute-2);
      width: 18px; height: 18px;
    }
    .team-arrow svg { width: 18px; height: 18px; }
    .team.locked .team-arrow { color: var(--amber); }

    .empty {
      padding: 32px; text-align: center;
      border: 1px dashed var(--border); border-radius: 12px;
      color: var(--fg-muted); font-size: 13px;
    }

    .footer { margin-top: 22px; display: flex; align-items: center; justify-content: space-between; gap: 12px; font-size: 12px; }
    .toggle {
      display: flex; align-items: center; gap: 8px; color: var(--fg-muted); cursor: pointer;
      user-select: none;
    }
    .toggle input { appearance: none; -webkit-appearance: none; width: 32px; height: 18px; background: #2a2a2a; border-radius: 10px; position: relative; cursor: pointer; transition: background 0.18s; }
    .toggle input::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: #efefef; border-radius: 50%; transition: transform 0.18s; }
    .toggle input:checked { background: var(--primary); }
    .toggle input:checked::after { transform: translateX(14px); }
    .toggle span { color: var(--fg); font-size: 12px; }
    .toggle small { display: block; color: var(--fg-muted); font-size: 10px; margin-top: 1px; }

    .err {
      margin-top: 14px; padding: 10px 12px;
      border-radius: 10px; background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.22);
      color: #fca5a5; font-size: 11px; display: none;
    }
    .err.visible { display: block; }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .loading { padding: 32px; text-align: center; color: var(--fg-muted); font-size: 13px; }
    .spinner { display: inline-block; width: 14px; height: 14px; vertical-align: -2px; margin-right: 6px; border: 2px solid rgba(255,255,255,0.22); border-top-color: currentColor; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <canvas id="darkveil" class="veil-canvas" aria-hidden="true"></canvas>
  <div class="veil-overlay" aria-hidden="true"></div>

  <main>
    <div class="card">
      <div class="header">
        <img src="./assets/logo.svg" alt="Faktur" />
        <h1>Choisir une équipe</h1>
        <a id="settings-link" href="./settings.html" class="settings-link" title="Préférences" aria-label="Préférences">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </a>
      </div>
      <p class="subtitle">Sélectionnez l'équipe avec laquelle vous voulez démarrer Faktur Desktop.</p>

      <div id="user-row" class="user-row" hidden>
        <span class="user-avatar" id="user-avatar"></span>
        <div class="user-name"><strong id="user-fullname"></strong><span id="user-email"></span></div>
        <button class="user-logout" id="logout" type="button">Se déconnecter</button>
      </div>

      <div id="loading" class="loading"><span class="spinner"></span>Chargement…</div>
      <div id="teams" class="teams" hidden></div>
      <div id="empty" class="empty" hidden>
        Aucune équipe trouvée. Créez-en une depuis l'application web puis revenez ici.
      </div>

      <div class="footer">
        <label class="toggle">
          <input type="checkbox" id="always-show" checked />
          <div>
            <span>Toujours afficher cette page au démarrage</span>
            <small>Décochez pour démarrer directement sur la dernière équipe utilisée.</small>
          </div>
        </label>
      </div>

      <div id="err" class="err"></div>
    </div>
  </main>

  <script src="./js/darkveil.js"></script>
  <script src="./js/team-select.js"></script>
</body>
</html>
