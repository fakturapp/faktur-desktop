<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-src 'none'; frame-ancestors 'none';" />
  <title>Faktur Desktop — Mise à jour</title>
  <link rel="icon" type="image/x-icon" href="./assets/favicon.ico" />

  <style>
    :root {
      --bg: #080808;
      --bg-card: #141414;
      --border: #222222;
      --fg: #efefef;
      --fg-muted: #999999;
      --primary: #6366f1;
      --primary-hover: #818cf8;
      --emerald: #22c55e;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.01em;
      overflow: hidden;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 28px;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 10% 10%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 90%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
      pointer-events: none;
    }
    main {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      text-align: center;
      animation: fadeInUp 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      opacity: 1;
    }
    .logo {
      width: 68px;
      height: 68px;
      margin: 0 auto 20px;
      filter: drop-shadow(0 12px 32px rgba(99, 102, 241, 0.4));
    }
    .logo img { width: 100%; height: 100%; display: block; }
    h1 {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 6px;
      letter-spacing: -0.02em;
    }
    .version {
      font-size: 11px;
      color: var(--fg-muted);
      margin: 0 0 22px;
    }
    .version strong {
      color: var(--primary);
      font-weight: 600;
    }
    .progress-wrap {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: #1c1c1c;
      overflow: hidden;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary), var(--primary-hover));
      border-radius: 999px;
      transition: width 0.25s ease-out;
      box-shadow: 0 0 12px rgba(99, 102, 241, 0.5);
    }
    .status {
      font-size: 12px;
      color: var(--fg-muted);
      min-height: 18px;
    }
    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #606060;
      margin-top: 6px;
      font-variant-numeric: tabular-nums;
    }
    .error {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.22);
      color: #fca5a5;
      font-size: 11px;
      text-align: left;
      display: none;
    }
    .error.visible { display: block; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
  </style>
</head>
<body>
  <main>
    <div class="logo"><img src="./assets/logo.svg" alt="Faktur" /></div>
    <h1 id="title">Mise à jour en cours</h1>
    <p class="version">
      Faktur Desktop va redémarrer en version <strong id="target-version">…</strong>
    </p>

    <div class="progress-wrap">
      <div id="bar" class="progress-bar"></div>
    </div>
    <div id="status" class="status">Préparation du téléchargement…</div>
    <div class="stats">
      <span id="downloaded">0 MB</span>
      <span id="percent">0%</span>
    </div>

    <div id="error" class="error"></div>
  </main>

  <script src="./js/update.js"></script>
</body>
</html>
