<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Téléchargement</title>
  <link rel="stylesheet" href="download.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <svg class="icon" viewBox="0 0 400 400" width="32" height="32">
        <g transform="translate(60, 20)">
          <path d="M 40 0 H 190 L 280 90 V 320 A 40 40 0 0 1 240 360 H 40 A 40 40 0 0 1 0 320 V 40 A 40 40 0 0 1 40 0 Z" fill="#6366f1"/>
          <path d="M 190 0 V 60 A 30 30 0 0 0 220 90 H 280 Z" fill="#4f46e5"/>
          <ellipse cx="90" cy="150" rx="30" ry="32" fill="white"/>
          <ellipse cx="98" cy="146" rx="15" ry="16" fill="#1e1b4b"/>
          <ellipse cx="104" cy="138" rx="5" ry="5" fill="white"/>
          <ellipse cx="190" cy="150" rx="30" ry="32" fill="white"/>
          <ellipse cx="198" cy="146" rx="15" ry="16" fill="#1e1b4b"/>
          <ellipse cx="204" cy="138" rx="5" ry="5" fill="white"/>
          <path d="M 105 220 C 120 245 160 245 175 220" stroke="white" stroke-width="15" stroke-linecap="round" fill="none"/>
        </g>
      </svg>
      <span class="title">Téléchargement</span>
      <button class="close-btn" id="closeBtn" onclick="window.fakturDownload.close()">
        <svg width="14" height="14" viewBox="0 0 14 14"><path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="filename" id="filename">En attente...</div>

    <div class="progress-container">
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-info">
        <span class="percent" id="percent">0%</span>
        <span class="size" id="size"></span>
      </div>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script>
    const filenameEl = document.getElementById('filename');
    const progressFill = document.getElementById('progressFill');
    const percentEl = document.getElementById('percent');
    const sizeEl = document.getElementById('size');
    const statusEl = document.getElementById('status');

    function formatBytes(bytes) {
      if (bytes === 0) return '0 o';
      const k = 1024;
      const sizes = ['o', 'Ko', 'Mo', 'Go'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    window.fakturDownload.onStart((data) => {
      filenameEl.textContent = data.filename;
      if (data.totalBytes > 0) {
        sizeEl.textContent = formatBytes(data.totalBytes);
      }
    });

    window.fakturDownload.onProgress((data) => {
      filenameEl.textContent = data.filename;

      if (data.percent === -1) {
        // Taille totale inconnue : mode indéterminé
        progressFill.classList.add('indeterminate');
        percentEl.textContent = '';
        sizeEl.textContent = formatBytes(data.received);
      } else {
        progressFill.classList.remove('indeterminate');
        progressFill.style.width = data.percent + '%';
        percentEl.textContent = data.percent + '%';
        if (data.total > 0) {
          sizeEl.textContent = formatBytes(data.received) + ' / ' + formatBytes(data.total);
        }
      }
    });

    window.fakturDownload.onComplete((data) => {
      progressFill.style.width = '100%';
      percentEl.textContent = '100%';
      statusEl.textContent = 'Terminé !';
      statusEl.classList.add('success');
    });

    window.fakturDownload.onError((data) => {
      statusEl.textContent = 'Erreur lors du téléchargement';
      statusEl.classList.add('error');
    });
  </script>
</body>
</html>
