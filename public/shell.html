<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Faktur App</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100vh;
      overflow: hidden;
      background: #09090b;
      font-family: 'Lexend', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
    }

    #titlebar {
      height: 36px;
      min-height: 36px;
      background: #09090b;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      -webkit-app-region: drag;
      user-select: none;
    }

    #titlebar .left {
      display: flex;
      align-items: center;
      padding-left: 12px;
      gap: 8px;
    }

    #titlebar .icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
    }
    #titlebar .icon svg {
      width: 20px;
      height: 20px;
    }

    #titlebar .title {
      font-size: 13px;
      font-weight: 500;
      color: #a1a1aa;
    }

    .controls {
      display: flex;
      height: 100%;
      -webkit-app-region: no-drag;
    }

    .controls button {
      width: 46px;
      height: 100%;
      border: none;
      background: transparent;
      color: #a1a1aa;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .controls button:hover {
      background: rgba(255,255,255,0.08);
      color: #fafafa;
    }
    .controls .close:hover {
      background: #ef4444;
      color: white;
    }

    #content {
      position: relative;
      flex: 1;
      overflow: hidden;
    }

    #site {
      width: 100%;
      height: 100%;
      border: none;
      background: #09090b;
    }

    /* ── Error overlay ── */
    #error-overlay {
      position: absolute; inset: 0; background: #09090b;
      display: none; flex-direction: column; align-items: center;
      justify-content: center; gap: 16px; z-index: 100;
    }
    #error-overlay.visible { display: flex; }
    #error-overlay .error-icon { color: #ef4444; }
    #error-overlay h2 { font-size: 18px; font-weight: 500; color: #fafafa; }
    #error-overlay p { font-size: 13px; color: #71717a; max-width: 340px; text-align: center; line-height: 1.5; }
    #error-overlay .retry-btn {
      margin-top: 8px; padding: 10px 28px; border: none; border-radius: 8px;
      background: #5b6eea; color: white; font-family: inherit; font-size: 13px;
      font-weight: 500; cursor: pointer; transition: background 0.15s;
    }
    #error-overlay .retry-btn:hover { background: #4c5fdb; }

    /* ── Password save bar ── */
    #pw-bar {
      position: absolute; top: 0; left: 0; right: 0;
      height: 42px; background: #1e1b4b;
      display: none; align-items: center; gap: 10px;
      padding: 0 16px; z-index: 60;
      border-bottom: 1px solid rgba(99,102,241,0.2);
      font-size: 12px; color: #e4e4e7;
    }
    #pw-bar.visible { display: flex; }
    #pw-bar .pw-icon { color: #818cf8; flex-shrink: 0; }
    #pw-bar .pw-text { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #pw-bar .pw-text strong { color: #c7d2fe; font-weight: 500; }
    #pw-bar .pw-actions { display: flex; gap: 6px; flex-shrink: 0; }
    #pw-bar .pw-actions button {
      border: none; border-radius: 6px; font-family: inherit;
      font-size: 11px; font-weight: 500; cursor: pointer; padding: 6px 14px;
      transition: background 0.15s;
    }
    #pw-bar .pw-save { background: #5b6eea; color: white; }
    #pw-bar .pw-save:hover { background: #4c5fdb; }
    #pw-bar .pw-dismiss { background: rgba(255,255,255,0.08); color: #a1a1aa; }
    #pw-bar .pw-dismiss:hover { background: rgba(255,255,255,0.12); color: #fafafa; }

    /* Download bubble */
    #dl-bubble {
      position: absolute; bottom: 16px; right: 16px; z-index: 50;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      transform: scale(0.8); touch-action: none;
    }
    #dl-bubble.visible { opacity: 1; pointer-events: auto; transform: scale(1); }
    #dl-bubble.dragging { transition: none; }
    #dl-bubble-btn {
      width: 42px; height: 42px; border-radius: 50%; border: none;
      background: #5b6eea; color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      box-shadow: 0 4px 16px rgba(91,110,234,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #dl-bubble.dragging #dl-bubble-btn { cursor: grabbing; transform: scale(1.05); }
    #dl-bubble-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 20px rgba(91,110,234,0.5);
    }
    .badge {
      position: absolute; top: -4px; right: -4px;
      min-width: 16px; height: 16px; border-radius: 8px;
      background: #ef4444; color: white; font-size: 9px; font-weight: 600;
      display: none; align-items: center; justify-content: center;
      padding: 0 4px; font-family: inherit; line-height: 1;
    }
    .badge.visible { display: flex; }
    .progress-ring {
      position: absolute; inset: -3px; width: 48px; height: 48px;
      transform: rotate(-90deg); pointer-events: none;
    }
    .ring-bg { fill: none; stroke: rgba(255,255,255,0.12); stroke-width: 2.5; }
    .ring-fill {
      fill: none; stroke: white; stroke-width: 2.5; stroke-linecap: round;
      stroke-dasharray: 131.95; stroke-dashoffset: 131.95;
      transition: stroke-dashoffset 0.3s ease;
    }

    /* Download panel */
    #dl-panel {
      position: absolute; bottom: 66px; right: 16px;
      width: 310px; max-height: 380px;
      background: #18181b; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; z-index: 51;
      display: none; flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5); overflow: hidden;
    }
    #dl-panel.visible { display: flex; }
    .dl-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .dl-panel-header span { font-size: 12px; font-weight: 500; color: #e4e4e7; }
    .dl-panel-header .actions { display: flex; gap: 2px; }
    .dl-panel-header button {
      width: 24px; height: 24px; border: none; background: transparent;
      color: #71717a; cursor: pointer; display: flex; align-items: center;
      justify-content: center; border-radius: 6px; transition: background 0.15s, color 0.15s;
    }
    .dl-panel-header button:hover { background: rgba(255,255,255,0.06); color: #fafafa; }
    .dl-panel-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .dl-panel-list::-webkit-scrollbar { width: 4px; }
    .dl-panel-list::-webkit-scrollbar-track { background: transparent; }
    .dl-panel-list::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 2px; }
    .dl-empty { padding: 20px 12px; text-align: center; color: #52525b; font-size: 11px; }
    .dl-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px; transition: background 0.1s; cursor: default;
    }
    .dl-item:hover { background: rgba(255,255,255,0.03); }
    .dl-icon {
      width: 28px; height: 28px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .dl-icon.completed { background: rgba(91,110,234,0.12); color: #93a3f8; }
    .dl-icon.failed { background: rgba(239,68,68,0.12); color: #f87171; }
    .dl-icon.active { background: rgba(91,110,234,0.12); color: #93a3f8; }
    .dl-info { flex: 1; min-width: 0; }
    .dl-name {
      font-size: 11px; font-weight: 400; color: #e4e4e7;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .dl-meta { font-size: 9px; color: #71717a; margin-top: 1px; }
    .dl-progress-bar {
      width: 100%; height: 3px; background: #27272a;
      border-radius: 2px; margin-top: 3px; overflow: hidden;
    }
    .dl-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #5b6eea, #7b8ef5);
      border-radius: 2px; transition: width 0.3s ease;
    }
    .dl-item-actions {
      display: flex; gap: 1px; flex-shrink: 0;
      opacity: 0; transition: opacity 0.15s;
    }
    .dl-item:hover .dl-item-actions { opacity: 1; }
    .dl-item-actions button {
      width: 22px; height: 22px; border: none; background: transparent;
      color: #71717a; cursor: pointer; display: flex; align-items: center;
      justify-content: center; border-radius: 4px; transition: background 0.1s, color 0.1s;
    }
    .dl-item-actions button:hover { background: rgba(255,255,255,0.06); color: #fafafa; }
  </style>
</head>
<body>
  <div id="titlebar">
    <div class="left">
      <div class="icon">
        <svg viewBox="0 0 400 400" width="20" height="20">
          <g transform="translate(60, 20)">
            <path d="M 40 0 H 190 L 280 90 V 320 A 40 40 0 0 1 240 360 H 40 A 40 40 0 0 1 0 320 V 40 A 40 40 0 0 1 40 0 Z" fill="#6366f1"/>
            <path d="M 190 0 V 60 A 30 30 0 0 0 220 90 H 280 Z" fill="#4f46e5"/>
            <ellipse cx="90" cy="150" rx="30" ry="32" fill="white"/>
            <ellipse cx="98" cy="146" rx="15" ry="16" fill="#1e1b4b"/>
            <ellipse cx="104" cy="138" rx="5" ry="5" fill="white"/>
            <ellipse cx="190" cy="150" rx="30" ry="32" fill="white"/>
            <ellipse cx="198" cy="146" rx="15" ry="16" fill="#1e1b4b"/>
            <ellipse cx="204" cy="138" rx="5" ry="5" fill="white"/>
            <path d="M 105 220 C 120 245 160 245 175 220" stroke="white" stroke-width="15" stroke-linecap="round" fill="none"/>
          </g>
        </svg>
      </div>
      <span class="title">Faktur App</span>
    </div>
    <div class="controls">
      <button onclick="window.fakturShell.minimize()">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect y="5" width="12" height="1.5" rx="0.75" fill="currentColor"/></svg>
      </button>
      <button onclick="window.fakturShell.maximize()">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
      <button class="close" onclick="window.fakturShell.close()">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <div id="content">
    <webview id="site" partition="persist:faktur" allowpopups></webview>

    <!-- Error overlay -->
    <div id="error-overlay">
      <svg class="error-icon" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M15 9l-6 6M9 9l6 6"/>
      </svg>
      <h2>Impossible de charger la page</h2>
      <p id="error-message">Vérifiez votre connexion internet et réessayez.</p>
      <button class="retry-btn" id="retry-btn">Réessayer</button>
    </div>

    <!-- Password save bar -->
    <div id="pw-bar">
      <svg class="pw-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
      <span class="pw-text">Enregistrer le mot de passe pour <strong id="pw-user"></strong> ?</span>
      <div class="pw-actions">
        <button class="pw-save" id="pw-save">Enregistrer</button>
        <button class="pw-dismiss" id="pw-dismiss">Non</button>
      </div>
    </div>

    <!-- Download bubble (draggable) -->
    <div id="dl-bubble">
      <button id="dl-bubble-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <path d="M12 3v12M12 15l-4-4M12 15l4-4"/>
          <path d="M5 20h14"/>
        </svg>
        <span class="badge" id="dl-badge">0</span>
        <svg class="progress-ring" viewBox="0 0 48 48">
          <circle class="ring-bg" cx="24" cy="24" r="21"/>
          <circle class="ring-fill" id="dl-ring" cx="24" cy="24" r="21"/>
        </svg>
      </button>
    </div>

    <!-- Download panel -->
    <div id="dl-panel">
      <div class="dl-panel-header">
        <span>Téléchargements</span>
        <div class="actions">
          <button title="Effacer l'historique" id="dl-clear">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
              <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
            </svg>
          </button>
          <button title="Fermer" id="dl-panel-close">
            <svg width="11" height="11" viewBox="0 0 12 12">
              <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="dl-panel-list" id="dl-list">
        <div class="dl-empty">Aucun téléchargement</div>
      </div>
    </div>
  </div>

  <script>
    const content = document.getElementById('content');
    const webview = document.getElementById('site');
    const url = window.fakturShell.getURL();
    const sitePreload = window.fakturShell.getSitePreloadPath();
    webview.setAttribute('preload', sitePreload);
    webview.setAttribute('src', url);

    /* ═══════════════════════════════════════════
       ERROR HANDLING + TIMEOUT
       Le timeout ne se déclenche QUE si le serveur
       ne répond pas du tout. Dès qu'on reçoit une
       réponse (did-navigate), on annule le timer.
       ═══════════════════════════════════════════ */
    const errorOverlay = document.getElementById('error-overlay');
    const errorMessage = document.getElementById('error-message');
    const retryBtn = document.getElementById('retry-btn');
    let loadTimeout = null;
    let serverResponded = false;

    function startLoadTimeout() {
      clearTimeout(loadTimeout);
      serverResponded = false;
      loadTimeout = setTimeout(() => {
        if (!serverResponded && !errorOverlay.classList.contains('visible')) {
          errorOverlay.classList.add('visible');
          errorMessage.textContent = 'Le serveur met trop de temps à répondre.';
        }
      }, 5000);
    }

    // Start timeout on initial load
    startLoadTimeout();

    // Le serveur a répondu → annuler le timeout immédiatement
    webview.addEventListener('did-navigate', () => {
      serverResponded = true;
      clearTimeout(loadTimeout);
    });
    webview.addEventListener('did-navigate-in-page', () => {
      serverResponded = true;
      clearTimeout(loadTimeout);
    });
    webview.addEventListener('dom-ready', () => {
      serverResponded = true;
      clearTimeout(loadTimeout);
    });

    // Page chargée avec succès
    webview.addEventListener('did-finish-load', () => {
      serverResponded = true;
      clearTimeout(loadTimeout);
      errorOverlay.classList.remove('visible');
    });

    // Chargement terminé (succès ou échec)
    webview.addEventListener('did-stop-loading', () => {
      clearTimeout(loadTimeout);
    });

    // Vrai échec de chargement
    webview.addEventListener('did-fail-load', (e) => {
      clearTimeout(loadTimeout);
      if (e.errorCode === -3) return; // navigation annulée, ignorer
      errorOverlay.classList.add('visible');
      const messages = {
        '-2': 'Impossible de se connecter au serveur.',
        '-6': 'Adresse introuvable.',
        '-7': 'Délai de connexion dépassé.',
        '-21': 'Connexion réseau perdue.',
        '-100': 'Connexion au serveur refusée.',
        '-101': 'Connexion réseau refusée.',
        '-102': 'La connexion a été interrompue.',
        '-105': 'Impossible de résoudre le nom du serveur.',
        '-106': 'Pas de connexion internet.',
        '-118': 'Délai de connexion dépassé.',
        '-200': 'Certificat de sécurité invalide.',
        '-201': 'Certificat de sécurité expiré.',
      };
      errorMessage.textContent = messages[String(e.errorCode)]
        || 'Vérifiez votre connexion internet et réessayez.';
    });

    retryBtn.addEventListener('click', () => {
      errorOverlay.classList.remove('visible');
      startLoadTimeout();
      webview.reload();
    });

    /* ═══════════════════════════════════════════
       PASSWORD SAVE BAR
       ═══════════════════════════════════════════ */
    const pwBar = document.getElementById('pw-bar');
    const pwUser = document.getElementById('pw-user');
    const pwSave = document.getElementById('pw-save');
    const pwDismiss = document.getElementById('pw-dismiss');
    let pendingCredentials = null;

    webview.addEventListener('ipc-message', async (e) => {
      if (e.channel === 'password-submit') {
        const data = e.args[0];
        if (!data) return;
        // Check if we already have these exact credentials saved
        const existing = await window.fakturShell.getCredentials(data.url);
        if (existing && existing.username === data.username && existing.password === data.password) return;
        pendingCredentials = data;
        pwUser.textContent = data.username;
        pwBar.classList.add('visible');
        // Auto-hide after 15s
        setTimeout(() => { if (pwBar.classList.contains('visible')) pwBar.classList.remove('visible'); }, 15000);
      }
      if (e.channel === 'request-credentials') {
        const data = e.args[0];
        if (!data) return;
        const creds = await window.fakturShell.getCredentials(data.url);
        if (creds) webview.send('fill-credentials', creds);
      }
    });

    pwSave.addEventListener('click', async () => {
      if (pendingCredentials) {
        await window.fakturShell.saveCredentials(pendingCredentials);
        pendingCredentials = null;
      }
      pwBar.classList.remove('visible');
    });

    pwDismiss.addEventListener('click', () => {
      pendingCredentials = null;
      pwBar.classList.remove('visible');
    });

    /* ═══════════════════════════════════════════
       DOWNLOAD BUBBLE (DRAGGABLE)
       ═══════════════════════════════════════════ */
    const dlBubble = document.getElementById('dl-bubble');
    const dlBubbleBtn = document.getElementById('dl-bubble-btn');
    const dlBadge = document.getElementById('dl-badge');
    const dlRing = document.getElementById('dl-ring');
    const dlPanel = document.getElementById('dl-panel');
    const dlList = document.getElementById('dl-list');
    const dlClear = document.getElementById('dl-clear');
    const dlPanelClose = document.getElementById('dl-panel-close');

    const RING_C = 2 * Math.PI * 21;
    let activeDownloads = new Map();
    let downloadHistory = [];
    let panelOpen = false;
    let hideTimer = null;

    // Drag state
    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let bubbleStartX = 0, bubbleStartY = 0;

    // Restore saved bubble position
    function restoreBubblePosition() {
      const saved = localStorage.getItem('dl-bubble-pos');
      if (!saved) return;
      try {
        const { xPct, yPct } = JSON.parse(saved);
        const cr = content.getBoundingClientRect();
        const x = Math.max(0, Math.min(xPct * cr.width, cr.width - 50));
        const y = Math.max(0, Math.min(yPct * cr.height, cr.height - 50));
        dlBubble.style.left = x + 'px';
        dlBubble.style.top = y + 'px';
        dlBubble.style.right = 'auto';
        dlBubble.style.bottom = 'auto';
      } catch { /* ignore */ }
    }
    restoreBubblePosition();

    // Drag handlers
    dlBubbleBtn.addEventListener('pointerdown', (e) => {
      isDragging = false;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      const rect = dlBubble.getBoundingClientRect();
      const cr = content.getBoundingClientRect();
      bubbleStartX = rect.left - cr.left;
      bubbleStartY = rect.top - cr.top;
      dlBubbleBtn.setPointerCapture(e.pointerId);

      const onMove = (e) => {
        const dx = e.clientX - dragStartX;
        const dy = e.clientY - dragStartY;
        if (!isDragging && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) {
          isDragging = true;
          dlBubble.classList.add('dragging');
        }
        if (isDragging) {
          const cr = content.getBoundingClientRect();
          const x = Math.max(0, Math.min(bubbleStartX + dx, cr.width - 50));
          const y = Math.max(0, Math.min(bubbleStartY + dy, cr.height - 50));
          dlBubble.style.left = x + 'px';
          dlBubble.style.top = y + 'px';
          dlBubble.style.right = 'auto';
          dlBubble.style.bottom = 'auto';
        }
      };

      const onUp = () => {
        dlBubbleBtn.removeEventListener('pointermove', onMove);
        dlBubbleBtn.removeEventListener('pointerup', onUp);
        if (isDragging) {
          dlBubble.classList.remove('dragging');
          // Save position as percentages
          const cr = content.getBoundingClientRect();
          const rect = dlBubble.getBoundingClientRect();
          localStorage.setItem('dl-bubble-pos', JSON.stringify({
            xPct: (rect.left - cr.left) / cr.width,
            yPct: (rect.top - cr.top) / cr.height
          }));
        }
      };

      dlBubbleBtn.addEventListener('pointermove', onMove);
      dlBubbleBtn.addEventListener('pointerup', onUp);
    });

    // Click toggles panel (only if not dragging)
    dlBubbleBtn.addEventListener('click', (e) => {
      if (isDragging) { isDragging = false; return; }
      panelOpen = !panelOpen;
      dlPanel.classList.toggle('visible', panelOpen);
      if (panelOpen) renderList();
    });

    dlPanelClose.addEventListener('click', () => {
      panelOpen = false;
      dlPanel.classList.remove('visible');
    });

    dlClear.addEventListener('click', () => {
      downloadHistory = [];
      window.fakturShell.clearDownloadHistory();
      renderList();
      if (activeDownloads.size === 0) {
        dlBubble.classList.remove('visible');
        panelOpen = false;
        dlPanel.classList.remove('visible');
      }
    });

    // Click outside panel to close
    document.addEventListener('click', (e) => {
      if (panelOpen && !dlPanel.contains(e.target) && !dlBubble.contains(e.target)) {
        panelOpen = false;
        dlPanel.classList.remove('visible');
      }
    });

    // Load history
    window.fakturShell.getDownloadHistory().then(h => {
      downloadHistory = h || [];
    });

    /* ── Download events ── */
    window.fakturShell.onDownloadStart((data) => {
      clearTimeout(hideTimer);
      activeDownloads.set(data.id, { ...data, percent: 0, received: 0 });
      dlBubble.classList.add('visible');
      updateBadge();
      if (panelOpen) renderList();
    });

    window.fakturShell.onDownloadProgress((data) => {
      const dl = activeDownloads.get(data.id);
      if (dl) { dl.percent = data.percent; dl.received = data.received; dl.total = data.total; }
      updateRing();
      if (panelOpen) renderList();
    });

    window.fakturShell.onDownloadComplete((data) => {
      activeDownloads.delete(data.id);
      downloadHistory.unshift({
        id: data.id, filename: data.filename,
        path: data.path, size: data.size,
        state: 'completed', date: new Date().toISOString()
      });
      updateBadge(); updateRing();
      if (panelOpen) renderList();
      scheduleHide();
    });

    window.fakturShell.onDownloadError((data) => {
      activeDownloads.delete(data.id);
      downloadHistory.unshift({
        id: data.id, filename: data.filename,
        state: 'failed', date: new Date().toISOString()
      });
      updateBadge(); updateRing();
      if (panelOpen) renderList();
      scheduleHide();
    });

    function scheduleHide() {
      if (activeDownloads.size > 0 || panelOpen) return;
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => {
        if (activeDownloads.size === 0 && !panelOpen) dlBubble.classList.remove('visible');
      }, 5000);
    }

    function updateBadge() {
      const n = activeDownloads.size;
      dlBadge.textContent = n;
      dlBadge.classList.toggle('visible', n > 0);
    }

    function updateRing() {
      if (activeDownloads.size === 0) { dlRing.style.strokeDashoffset = RING_C; return; }
      let sum = 0, count = 0;
      for (const dl of activeDownloads.values()) {
        if (dl.percent >= 0) { sum += dl.percent; count++; }
      }
      const avg = count > 0 ? sum / count : 0;
      dlRing.style.strokeDashoffset = RING_C - (avg / 100) * RING_C;
    }

    function formatBytes(b) {
      if (!b || b <= 0) return '';
      const k = 1024, s = ['o','Ko','Mo','Go'];
      const i = Math.floor(Math.log(b) / Math.log(k));
      return parseFloat((b / Math.pow(k, i)).toFixed(1)) + ' ' + s[i];
    }

    function formatDate(iso) {
      try {
        const d = new Date(iso);
        return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' })
          + ' ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      } catch { return ''; }
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function renderList() {
      const items = [];

      for (const [id, dl] of activeDownloads) {
        const pct = dl.percent >= 0 ? dl.percent : 0;
        const sz = dl.total > 0
          ? formatBytes(dl.received) + ' / ' + formatBytes(dl.total)
          : formatBytes(dl.received);
        items.push(`
          <div class="dl-item">
            <div class="dl-icon active">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                <path d="M12 3v12M12 15l-4-4M12 15l4-4"/>
              </svg>
            </div>
            <div class="dl-info">
              <div class="dl-name">${esc(dl.filename)}</div>
              <div class="dl-meta">${pct}% &middot; ${sz}</div>
              <div class="dl-progress-bar"><div class="dl-progress-fill" style="width:${pct}%"></div></div>
            </div>
          </div>
        `);
      }

      for (const entry of downloadHistory) {
        if (activeDownloads.has(entry.id)) continue;
        const ok = entry.state === 'completed';
        const icon = ok
          ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>'
          : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>';
        const meta = (ok ? 'Terminé' : 'Échoué')
          + (entry.size ? ' &middot; ' + formatBytes(entry.size) : '')
          + ' &middot; ' + formatDate(entry.date);
        const actions = ok && entry.path
          ? `<div class="dl-item-actions">
               <button title="Ouvrir le dossier" data-folder="${esc(entry.path)}">
                 <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                   <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
                 </svg>
               </button>
             </div>` : '';
        items.push(`
          <div class="dl-item">
            <div class="dl-icon ${entry.state}">${icon}</div>
            <div class="dl-info">
              <div class="dl-name">${esc(entry.filename)}</div>
              <div class="dl-meta">${meta}</div>
            </div>
            ${actions}
          </div>
        `);
      }

      dlList.innerHTML = items.length > 0
        ? items.join('')
        : '<div class="dl-empty">Aucun téléchargement</div>';
    }

    // Delegate clicks for folder buttons
    dlList.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-folder]');
      if (btn) window.fakturShell.openDownloadFolder(btn.dataset.folder);
    });
  </script>
</body>
</html>
