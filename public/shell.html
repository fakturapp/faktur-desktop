<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Faktur App</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100vh;
      overflow: hidden;
      background: #09090b;
      font-family: 'Lexend', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
    }

    #titlebar {
      height: 36px;
      min-height: 36px;
      background: #09090b;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      -webkit-app-region: drag;
      user-select: none;
    }

    #titlebar .left {
      display: flex;
      align-items: center;
      padding-left: 12px;
      gap: 8px;
    }

    #titlebar .icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
    }
    #titlebar .icon svg {
      width: 20px;
      height: 20px;
    }

    #titlebar .title {
      font-size: 13px;
      font-weight: 500;
      color: #a1a1aa;
    }

    .controls {
      display: flex;
      height: 100%;
      -webkit-app-region: no-drag;
    }

    .controls button {
      width: 46px;
      height: 100%;
      border: none;
      background: transparent;
      color: #a1a1aa;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .controls button:hover {
      background: rgba(255,255,255,0.08);
      color: #fafafa;
    }
    .controls .close:hover {
      background: #ef4444;
      color: white;
    }

    #site {
      flex: 1;
      border: none;
      background: #09090b;
    }
  </style>
</head>
<body>
  <div id="titlebar">
    <div class="left">
      <div class="icon">
        <svg viewBox="0 0 400 400" width="20" height="20">
          <g transform="translate(60, 20)">
            <path d="M 40 0 H 190 L 280 90 V 320 A 40 40 0 0 1 240 360 H 40 A 40 40 0 0 1 0 320 V 40 A 40 40 0 0 1 40 0 Z" fill="#6366f1"/>
            <path d="M 190 0 V 60 A 30 30 0 0 0 220 90 H 280 Z" fill="#4f46e5"/>
            <ellipse cx="90" cy="150" rx="30" ry="32" fill="white"/>
            <ellipse cx="98" cy="146" rx="15" ry="16" fill="#1e1b4b"/>
            <ellipse cx="104" cy="138" rx="5" ry="5" fill="white"/>
            <ellipse cx="190" cy="150" rx="30" ry="32" fill="white"/>
            <ellipse cx="198" cy="146" rx="15" ry="16" fill="#1e1b4b"/>
            <ellipse cx="204" cy="138" rx="5" ry="5" fill="white"/>
            <path d="M 105 220 C 120 245 160 245 175 220" stroke="white" stroke-width="15" stroke-linecap="round" fill="none"/>
          </g>
        </svg>
      </div>
      <span class="title">Faktur App</span>
    </div>
    <div class="controls">
      <button onclick="window.fakturShell.minimize()">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect y="5" width="12" height="1.5" rx="0.75" fill="currentColor"/></svg>
      </button>
      <button onclick="window.fakturShell.maximize()">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
      <button class="close" onclick="window.fakturShell.close()">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <webview id="site" partition="persist:faktur" allowpopups></webview>

  <script>
    const webview = document.getElementById('site');
    const url = window.fakturShell.getURL();
    webview.setAttribute('src', url);
  </script>
</body>
</html>
