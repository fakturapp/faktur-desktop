<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Faktur App</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100vh;
      overflow: hidden;
      background: #09090b;
      font-family: 'Lexend', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
    }

    #titlebar {
      height: 36px;
      min-height: 36px;
      background: #09090b;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      -webkit-app-region: drag;
      user-select: none;
    }

    #titlebar .left {
      display: flex;
      align-items: center;
      padding-left: 12px;
      gap: 8px;
    }

    #titlebar .icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
    }
    #titlebar .icon svg {
      width: 20px;
      height: 20px;
    }

    #titlebar .title {
      font-size: 13px;
      font-weight: 500;
      color: #a1a1aa;
    }

    .controls {
      display: flex;
      height: 100%;
      -webkit-app-region: no-drag;
    }

    .controls button {
      width: 46px;
      height: 100%;
      border: none;
      background: transparent;
      color: #a1a1aa;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .controls button:hover {
      background: rgba(255,255,255,0.08);
      color: #fafafa;
    }
    .controls .close:hover {
      background: #ef4444;
      color: white;
    }

    #content {
      position: relative;
      flex: 1;
      overflow: hidden;
    }

    #site {
      width: 100%;
      height: 100%;
      border: none;
      background: #09090b;
    }

    /* Error overlay */
    #error-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: #09090b;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 100;
      color: #fafafa;
      text-align: center;
      padding: 32px;
    }
    #error-overlay.visible { display: flex; }
    #error-overlay .error-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(239,68,68,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }
    #error-overlay h2 {
      font-size: 18px;
      font-weight: 600;
      color: #fafafa;
    }
    #error-overlay p {
      font-size: 13px;
      font-weight: 300;
      color: #71717a;
      max-width: 360px;
      line-height: 1.5;
    }
    #error-overlay button {
      margin-top: 8px;
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      background: #6366f1;
      color: white;
      font-family: 'Lexend', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    #error-overlay button:hover {
      background: #4f46e5;
    }

    /* Password save bar */
    #pw-bar {
      display: none;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: #18181b;
      border-top: 1px solid rgba(255,255,255,0.06);
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      z-index: 100;
    }
    #pw-bar.visible { display: flex; }
    #pw-bar .lock-icon {
      color: #a1a1aa;
      flex-shrink: 0;
    }
    #pw-bar .pw-text {
      flex: 1;
      font-size: 13px;
      font-weight: 400;
      color: #d4d4d8;
    }
    #pw-bar .pw-text strong {
      font-weight: 600;
      color: #fafafa;
    }
    #pw-bar .pw-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    #pw-bar .pw-actions button {
      padding: 6px 16px;
      border: none;
      border-radius: 6px;
      font-family: 'Lexend', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    #pw-bar .btn-save {
      background: #6366f1;
      color: white;
    }
    #pw-bar .btn-save:hover {
      background: #4f46e5;
    }
    #pw-bar .btn-dismiss {
      background: rgba(255,255,255,0.06);
      color: #a1a1aa;
    }
    #pw-bar .btn-dismiss:hover {
      background: rgba(255,255,255,0.12);
      color: #fafafa;
    }
  </style>
</head>
<body>
  <div id="titlebar">
    <div class="left">
      <div class="icon">
        <svg viewBox="0 0 400 400" width="20" height="20">
          <g transform="translate(60, 20)">
            <path d="M 40 0 H 190 L 280 90 V 320 A 40 40 0 0 1 240 360 H 40 A 40 40 0 0 1 0 320 V 40 A 40 40 0 0 1 40 0 Z" fill="#6366f1"/>
            <path d="M 190 0 V 60 A 30 30 0 0 0 220 90 H 280 Z" fill="#4f46e5"/>
            <ellipse cx="90" cy="150" rx="30" ry="32" fill="white"/>
            <ellipse cx="98" cy="146" rx="15" ry="16" fill="#1e1b4b"/>
            <ellipse cx="104" cy="138" rx="5" ry="5" fill="white"/>
            <ellipse cx="190" cy="150" rx="30" ry="32" fill="white"/>
            <ellipse cx="198" cy="146" rx="15" ry="16" fill="#1e1b4b"/>
            <ellipse cx="204" cy="138" rx="5" ry="5" fill="white"/>
            <path d="M 105 220 C 120 245 160 245 175 220" stroke="white" stroke-width="15" stroke-linecap="round" fill="none"/>
          </g>
        </svg>
      </div>
      <span class="title">Faktur App</span>
    </div>
    <div class="controls">
      <button onclick="window.fakturShell.minimize()">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect y="5" width="12" height="1.5" rx="0.75" fill="currentColor"/></svg>
      </button>
      <button onclick="window.fakturShell.maximize()">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
      </button>
      <button class="close" onclick="window.fakturShell.close()">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>

  <div id="content">
    <webview id="site" partition="persist:faktur" allowpopups></webview>

    <div id="error-overlay">
      <div class="error-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
      </div>
      <h2>Impossible de charger la page</h2>
      <p id="error-message"></p>
      <button onclick="location.reload()">Réessayer</button>
    </div>

    <div id="pw-bar">
      <svg class="lock-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <span class="pw-text">Enregistrer le mot de passe pour <strong id="pw-user"></strong> ?</span>
      <div class="pw-actions">
        <button class="btn-save">Enregistrer</button>
        <button class="btn-dismiss">Non</button>
      </div>
    </div>
  </div>

  <script>
    const content = document.getElementById('content');
    const webview = document.getElementById('site');
    const url = window.fakturShell.getURL();
    const sitePreload = window.fakturShell.getSitePreloadPath();
    webview.setAttribute('preload', sitePreload);
    webview.setAttribute('src', url);
  </script>
</body>
</html>
